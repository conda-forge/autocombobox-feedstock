{% set name = "autocombobox" %}
{% set version = "1.5.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/autocombobox-{{ version }}.tar.gz
  sha256: d0dc526edb590db824607521bc5efe6d5f634d98253630784e515c79b65221f1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - autocombobox
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Church-17/autocombobox
  summary: Ttk widge that insert a Combobox into GUIs that allows suggestions based on what the user writes
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
